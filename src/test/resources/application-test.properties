# 测试环境配置

# 应用配置
spring.application.name=ancient-stars-test

# 使用H2内存数据库进行测试
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# 禁用Flyway（使用JPA自动创建表）
spring.flyway.enabled=false

# JWT配置（测试用）
jwt.secret=dGVzdFNlY3JldEtleUZvclRlc3RpbmdQdXJwb3Nlc09ubHk=
jwt.expiration=3600000
jwt.refresh-expiration=7200000

# 日志配置
logging.level.root=INFO
logging.level.com.example.ancientstars=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG

# Redis配置（测试环境使用嵌入式或禁用）
spring.cache.type=none

# 禁用限流（测试环境）
# 如果需要测试限流，可以启用

# 异步任务配置（测试环境同步执行）
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=2
